name: Veracode Static Scan — PagoFácil

# Este workflow se dispara manualmente desde la pestaña Actions.
# Veracode Static Scan tarda 10-30 min, por eso no se ejecuta en cada push.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  veracode-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Empaqueta el código fuente excluyendo lo que no necesita Veracode.
      - name: Package source code
        run: |
          zip -r veracode-payload.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x "*.zip" \
            -x ".cache/*" \
            -x "docs/plan-b/capturas/*"

      # La versión 0.2.6 usaba Docker con openjdk:latest (imagen ya no disponible).
      # 0.2.10+ está reescrita en TypeScript/JavaScript y no requiere Docker.
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # NOTA: esta action sigue en Node 20 (incluso la última 0.2.11). El warning
      # "Node.js 20 is deprecated" para esta action NO se puede quitar desde aquí;
      # desaparecerá cuando Veracode publique una versión en Node 24.
      - name: Veracode Upload and Scan
        uses: veracode/veracode-uploadandscan-action@0.2.10
        with:
          appname: 'PagoFácil-Demo'
          createprofile: true
          filepath: 'veracode-payload.zip'
          vid: '${{ secrets.VERACODE_API_ID }}'
          vkey: '${{ secrets.VERACODE_API_KEY }}'
          criticality: 'High'
          # scantimeout: 0 = sube el código y lanza el scan, pero NO espera el
          # veredicto en el pipeline. El resultado se revisa en el dashboard de
          # Veracode. Se usa 0 a propósito: la cuenta de esta demo tiene permisos
          # limitados y al ESPERAR (scantimeout > 0) el scan devuelve "Access denied"
          # al leer el resultado. Con 0 el workflow queda verde (flujo de la demo).
          scantimeout: 0
          # Borra automáticamente un scan anterior atascado (incomplete/failed)
          # antes de iniciar uno nuevo. Evita el error:
          # "App not in state where new builds are allowed".
          # 1 = borra incomplete/sin-módulos/failed/canceled (seguro). 2 = más agresivo.
          deleteincompletescan: 1
