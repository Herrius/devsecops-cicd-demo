name: Veracode Static Scan — PagoFácil

# Este workflow se dispara manualmente desde la pestaña Actions.
# Veracode Static Scan tarda 10-30 min, por eso no se ejecuta en cada push.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  veracode-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Empaqueta el código fuente excluyendo lo que no necesita Veracode.
      - name: Package source code
        run: |
          zip -r veracode-payload.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x "*.zip" \
            -x ".cache/*" \
            -x "docs/plan-b/capturas/*"

      # La versión 0.2.6 usaba Docker con openjdk:latest (imagen ya no disponible).
      # 0.2.10+ está reescrita en TypeScript/JavaScript y no requiere Docker.
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # NOTA: esta action sigue en Node 20 (incluso la última 0.2.11). El warning
      # "Node.js 20 is deprecated" para esta action NO se puede quitar desde aquí;
      # desaparecerá cuando Veracode publique una versión en Node 24.
      - name: Veracode Upload and Scan
        uses: veracode/veracode-uploadandscan-action@0.2.10
        with:
          appname: 'PagoFácil-Demo'
          createprofile: true
          filepath: 'veracode-payload.zip'
          vid: '${{ secrets.VERACODE_API_ID }}'
          vkey: '${{ secrets.VERACODE_API_KEY }}'
          criticality: 'High'
          # Espera hasta 30 min a que la plataforma termine y devuelva el veredicto.
          # (antes era 0 = solo subía y terminaba en segundos, sin resultado real)
          # NOTA: esta action (upload-and-scan) NO tiene parámetro para fallar el
          # build por política; solo falla si el scan excede este timeout. El
          # veredicto de política se revisa en el dashboard de Veracode.
          # Para un gate duro en CI se usa veracode-pipeline-scan-action (fail_build).
          scantimeout: 30
